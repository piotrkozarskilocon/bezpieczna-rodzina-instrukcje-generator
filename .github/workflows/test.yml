name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Next 16 wymaga >=22.13. Node 20 + stary npm zlostriwie czytaja
          # lockfile v3 z optional deps (@emnapi/*) i wywalaja "Missing from
          # lock file" mimo ze entry istnieje.
          node-version: "22"
          cache: "npm"

      - name: Install deps
        # `npm install` zamiast `npm ci` bo dev odbywa sie na Windows a CI to
        # Linux. Sharp + inne native modules instaluja optional bindings per
        # platform → lockfile generowany na Windows NIE MA entries Linux-only
        # (@emnapi/core, @emnapi/runtime). `npm ci` na Linux wtedy: "Missing
        # from lock file". `npm install` toleruje brak i dociaga.
        run: npm install --no-audit --no-fund

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # Lint disabled until eslint config stabilized — Next 16 + flat config kwiruje
      # niektóre legacy pluginy. Włączymy jak skończymy ten ticket osobno.
      # - name: Lint
      #   run: npm run lint
